<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT 1</title>
    <link rel="stylesheet" href="proj1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

<body>
    <!-- MAKING PROJECT IN PLAYFIR DISPLAY FONT  -->
    <div class="outer-container">
        <div class="color-container">
            <div class="img">
                <img src="PROFILE SS.png" alt="image_of_user">
            </div>
        </div>
        <div class="info-container">
            <div class="info">
                <p class="chann">CodingLab</p>
                <p class="prof">YouTuber & Blogger</p>
            </div>
            <div class="style-icons">
                <div class="facebook">
                    <i class="fa-brands fa-facebook""></i>
                </div>
                <div class="twitter">
                    <i class="fa-brands fa-twitter"></i>
                </div>
                <div class="instagram">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <div class="youtube">
                       <i class="fa-brands fa-youtube"></i>
                </div>
            </div>
            <div class="buttons">
                <button>Subscribe</button>
                <button>Message</button>
            </div>
            <div class="lcs-icons">
                <i class="fa-regular fa-heart"><span class="like">&nbsp;60k&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></i>
                <i class="fa-regular fa-comment"><span class="comment">&nbsp;20k&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></i>
                <i class="fa-regular fa-share">&nbsp;12k<span class="share"></span></i>
            </div>
        </div>
    </div>
