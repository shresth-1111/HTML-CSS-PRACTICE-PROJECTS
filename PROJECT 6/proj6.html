<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTRO PAGE</title>
    <link rel="stylesheet" href="proj6.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
          crossorigin="anonymous" 
          referrerpolicy="no-referrer" 
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">
                <img src="logo.png" alt="Logo Img Stuckify">
            </div>
            <div class="options">
                <span>Home</span>
                <span>Latest</span>
                <span>Category</span>
                <span>Services</span>
                <span>Contact</span>
            </div>
            <div class="search_bar">
                <div class="icon_search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <div class="input_search">
                    <input type="text" placeholder="Search here..">
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="material">
            <div class="details">
                <div class="head">
                    <span>Hello, It's Me</span>
                </div>
                <div class="name">
                    <span>Hannah Lennon</span>
                </div>
                <div class="info">
                    <div class="normal_text">And I'm a </div>
                    <div class="animate_box"><span class="animate_text">Youtuber, Blogger</span></div>
                </div>
            </div>
            <div class="buttons">
                <div class="abt_me">
                    <button>About Me</button>
                </div>
                <div class="follow_me">
                    <button>Follow Me</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
