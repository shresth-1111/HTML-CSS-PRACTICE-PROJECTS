<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT 5</title>
    <link rel="stylesheet" href="proj5.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer" />
</head>
<body>
    <input type="checkbox" id="check_on">
    <div class="hamburgar_menu">
        <label for="check_on"><i class="fa-solid fa-bars" style="color: #ffffff;"></i></label>
    </div>
    <div class="sidebar_menu">
        <div class="head">
            <p>Coding Lab</p>
            <label for="check_on"><i class="fa-solid fa-xmark" style="color:white"></i></label>
        </div>
        <div class="board_options">
            <div class="dash">
                <i class="fa-brands fa-microsoft" style="color: #ffffff;"></i>
                <p>Dashboard</p>
            </div>
            <div class="short">
                <i class="fa-solid fa-link" style="color: #ffffff;"></i>
                <p>Shortcuts</p>
            </div>
            <div class="over">
                <i class="fa-solid fa-bars-staggered" style="color: #ffffff;"></i>
                <p>Overview</p>
            </div>
            <div class="event">
                <i class="fa-regular fa-calendar" style="color: #ffffff;"></i>
                <p>Events</p>
            </div>
            <div class="about">
                <i class="fa-regular fa-circle-question" style="color: #ffffff;"></i>
                <p>About</p>
            </div>
            <div class="service">
                <i class="fa-solid fa-sliders" style="color: #ffffff;"></i>
                <p>Services</p>
            </div>
            <div class="contact">
                <i class="fa-solid fa-phone" style="color: #ffffff;"></i>
                <p>Contact</p>
            </div>
            <div class="feedback">
                <i class="fa-regular fa-comment" style="color: #ffffff;"></i>
                <p>Feedback</p>
            </div>
        </div>
    </div>
</body>
</html>
